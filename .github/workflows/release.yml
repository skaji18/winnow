# リリース作成 (DECISIONS「リリース手順の変更 — main マージ起点の自動タグ + Release」節)。
# 手順: package.json の version を上げる変更を main にマージするだけ。本ワークフローが
# main への push を検知し、ビルドゲート(CLAUDE.md と同一)を通してからタグ `v<version>` と
# GitHub Release を自動作成する (GitHub 上の操作だけで完結。ローカルの git tag は不要)。
# サーバ側の updater.ts はこの Release (releases/latest) を検知し、タグを checkout して適用する。
#
# タグ作成を別ワークフローに分けない理由: GITHUB_TOKEN が作った ref は push イベントの
# ワークフローを起動しない (Actions の再帰防止仕様) ため、「タグ作成 → タグ push 起動の
# release」という2本の連鎖は PAT なしでは組めない。1本に統合すれば GITHUB_TOKEN で足りる。
name: release

on:
  push:
    branches: [main]
    # version 変更を含む push だけに反応する粗いフィルタ。version 以外の package.json 変更でも
    # 起動するが、下の「タグ既存なら no-op」で無害に終わる。
    paths: ["package.json"]

permissions:
  contents: write # タグ + Release 作成に必要 (それ以外の権限は付けない)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # タグ名は package.json の version から導出する (単一真実源。旧構成にあった
      # 「タグと version の一致検証」は生成に置き換わり構造的に不要)。タグが既に
      # あれば何もしない (冪等。re-run や version 以外の変更で二重リリースしない)。
      - name: Resolve version
        id: ver
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code origin "refs/tags/$TAG" > /dev/null; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "$TAG already exists; nothing to release"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.ver.outputs.released == 'false'
        with:
          node-version: 22
          cache: npm

      - name: Install
        if: steps.ver.outputs.released == 'false'
        run: npm ci --include=dev --no-audit --no-fund

      # ビルドゲート (npm run gate が単一真実源。内訳は package.json / CLAUDE.md を参照)。
      # 壊れた commit からタグ/Release を作らない=適用側 (updater.ts) が壊れた版を掴まない
      # 最初の防波堤。タグ作成自体も gate の後ろ (壊れたタグを残さない)。
      - name: Build gate
        if: steps.ver.outputs.released == 'false'
        run: npm run gate

      # gh release create はタグが未存在なら --target の commit に自動作成する
      # (専用のタグ作成ステップは不要)。
      - name: Create tag and GitHub Release
        if: steps.ver.outputs.released == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: gh release create "$TAG" --generate-notes --target "$GITHUB_SHA"
